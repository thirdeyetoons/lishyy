<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>URL Shortener</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
        <input id="urlInput" class="w-full p-2 border mb-4" placeholder="Paste URL">
        <button id="shortenBtn" class="w-full bg-blue-600 text-white py-2 rounded">Shorten</button>
        <div id="resultArea" class="hidden mt-4">
            <input id="shortUrlDisplay" readonly class="w-full p-2 border bg-gray-50">
        </div>
    </div>
    <script>
        document.getElementById('shortenBtn').onclick = async () => {
            const url = document.getElementById('urlInput').value;
            const res = await fetch('/api/shorten', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ url }) 
            });
            const data = await res.json();
            document.getElementById('shortUrlDisplay').value = data.shortUrl;
            document.getElementById('resultArea').classList.remove('hidden');
        };
    </script>
</body>
</html>
