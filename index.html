<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>URL Shortener</title>
</head>
<body>
    <input type="text" id="urlInput" placeholder="Paste your long link here">
    <button id="shortenBtn">Shorten URL</button>
    <p id="resultArea" style="display:none;">
        Your shortened URL: <input id="shortUrlDisplay" readonly>
    </p>

    <script>
        document.getElementById('shortenBtn').addEventListener('click', async () => {
            const urlInput = document.getElementById('urlInput').value;
            console.log("Button clicked!"); // Check if this appears in console!

            const res = await fetch('/api/shorten', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ url: urlInput }) 
            });

            const data = await res.json();
            
            if (data.shortUrl) {
                document.getElementById('shortUrlDisplay').value = data.shortUrl;
                document.getElementById('resultArea').style.display = 'block';
            } else {
                alert("Error: " + data.error);
            }
        });
    </script>
</body>
</html>
